	<style>
		.star{
			width: 200px;
			/*animation-name: spinAndMoveStar;

			/*animation-delay: 5s;*/
			animation: spinAndMoveStar 2s ease-in-out infinite alternate;p

		}

		@keyframes spinAndMoveStar{
			50%{
				transform: translateX(150%) rotate(360deg) scale(0.5);
			}
			100%{
				transform: translateX(300%);
			}
		}

	</style>
