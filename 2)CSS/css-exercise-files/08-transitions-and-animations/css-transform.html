<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Transform Properties</title>
	<style>
		#box-1{
			background-color: red;
			margin:150px 40px;
			height: 200px;
			width: 200px;
			transform: translateX(100px) scale(1.5) rotate(-80deg) skewX(30deg);

		}
		#box-2{
			background-color: green;
			margin:40px 40px;
			height: 200px;
			width: 200px;
			transform: rotate(50deg) scaleY(1.5);
			
		}
		#box-3{
			background-color: blue;
			margin:40px 40px;
			height: 200px;
			width: 200px;
			transform: skewX(30deg);
			
		}
		#box-4{
			background-color: purple;
			margin:40px 40px;
			height: 200px;
			width: 200px;
			transform: translateY(50px);
			
		}
		
	</style>
</head>
<body>
	<div id="box-1"></div>
	<!-- <div id="box-2"></div>
	<div id="box-3"></div>
	<div id="box-4"></div> -->
</body>
</html>
