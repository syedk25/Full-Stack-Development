<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Transparent Background</title>
	<style>
		body{
			width: 100%;
			height: 400px;
			background-image: url('img/1.jpg');
			background-position: center center;
		}
		section{
			background-color: black;
			height: 100px;
			width: 300px;
			margin-top: 300px;
			line-height: 100px;
			text-align: center;
			color: white;
			box-sizing: border-box;
			margin-left: auto;
			margin-right: auto;
			opacity: 0.5;
		}
	</style>
</head>
<body>
	<div>
		<section>
			I am a dummy text.
		</section>
	</div>
	
</body>
</html>
