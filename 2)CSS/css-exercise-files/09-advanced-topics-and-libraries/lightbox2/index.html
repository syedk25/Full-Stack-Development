<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Lightbox Example</title>
  <link rel="stylesheet" href="dist/css/lightbox.min.css">
  <style type="text/css">
  	img{
  		width: 600px;
  	}
  </style>
</head>
<body>

  <section>
   
    <h3>Image Set</h3>
    <div>
      <a class="example-image-link" href="../img/1.jpg" data-lightbox="example-set" data-title="I am a title">
      	<img class="example-image" src="../img/1.jpg" alt=""/>
      </a>
      <a class="example-image-link" href="../img/2.jpg" data-lightbox="example-set" data-title="">
      	<img class="example-image" src="../img/2.jpg" alt=""/>
      </a>
      <a class="example-image-link" href="../img/3.jpg" data-lightbox="example-set" data-title="">
      	<img class="example-image" src="../img/3.jpg" alt=""/>
      </a>
      
    </div>
  </section>

  

  <script src="dist/js/lightbox-plus-jquery.min.js"></script>

  <!-- <script src="../bower_components/jquery/dist/jquery.js"></script>
  <script src="../src/js/lightbox.js"></script> -->
  

  

</body>
</html>
